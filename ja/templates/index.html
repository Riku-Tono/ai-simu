<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会話するAIウホシミュレーション</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body data-total="{{ total }}">

  <main class="app">

    <!-- ═══ STAGE (left) ═══ -->
    <section class="stage">
      <div class="stage__header">
        <div>
          <p class="label">UHO SIMULATION v1.0 — Flask Edition</p>
          <h1>会話するAIウホシミュレーション</h1>
          <p class="intro">AIが会話の流れに乗りすぎないための仕組みを見る紙芝居デモ。ログと計算ロジックはPython側に分離済み。</p>
          <div class="phase-badge phase-1" id="phaseBadge">フェーズ 読込中</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
          <div class="turn-counter" id="turnCounter">読み込み中...</div>
          <p class="demo-notice">※ これは固定ログによる概念デモです。実測・診断ではありません。</p>
        </div>
      </div>

      <!-- Viewer note headline -->
      <div class="viewer-headline" id="viewerHeadline">—</div>

      <div class="conversation" id="conversation">
        <div class="loading">ログを取得しています...</div>
      </div>

      <div class="disclosure is-empty" id="disclosureBox">
        <span>DISCLOSURE</span>
        <p id="disclosureText">開示なし</p>
      </div>

      <div class="controls">
        <button type="button" id="prevBtn" disabled>前へ</button>
        <button type="button" id="playBtn" disabled>再生</button>
        <button type="button" id="nextBtn" disabled>次へ</button>
        <button type="button" id="resetBtn" disabled>リセット</button>
      </div>
    </section>

    <!-- ═══ PANEL (middle) ═══ -->
    <aside class="panel">
      <section class="card">
        <h2>状態</h2>
        <div class="state-row">
          <span id="statePill" class="pill">—</span>
          <span id="referenceState" style="font-size:12px;color:var(--muted)">—</span>
        </div>
        <p class="note" id="viewerNote">—</p>
      </section>

      <section class="card">
        <h2>内部メーター</h2>
        <div class="meter">
          <div class="meter__head"><span>U_fast</span><strong id="uFastValue">—</strong></div>
          <div class="meter__track"><div id="uFastBar" class="meter__bar meter__bar--fast"></div></div>
        </div>
        <div class="meter">
          <div class="meter__head"><span>U_slow</span><strong id="uSlowValue">—</strong></div>
          <div class="meter__track"><div id="uSlowBar" class="meter__bar meter__bar--slow"></div></div>
        </div>
        <div class="meter">
          <div class="meter__head"><span>friction</span><strong id="frictionValue">—</strong></div>
          <div class="meter__track"><div id="frictionBar" class="meter__bar meter__bar--friction"></div></div>
        </div>
        <div class="meter">
          <div class="meter__head"><span>drift</span><strong id="driftValue">—</strong></div>
          <div class="meter__track"><div id="driftBar" class="meter__bar meter__bar--drift"></div></div>
        </div>
      </section>

      <section class="card chart-card">
        <h2>推移グラフ（全20ターン）</h2>
        <div class="chart-wrapper">
          <canvas id="metricsChart"
            role="img"
            aria-label="U_fast, U_slow, friction, drift の20ターン推移折れ線グラフ">
            メトリクス推移グラフ
          </canvas>
        </div>
        <div id="chartLegend"></div>
      </section>

      <section class="card">
        <h2>介入</h2>
        <p id="interventionText" class="intervention">—</p>
      </section>
    </aside>

    <!-- ═══ TIMELINE (right) ═══ -->
    <div class="timeline-col">
      <div class="timeline-card">
        <h2>タイムライン</h2>
        <div class="timeline-dots" id="timelineDots"></div>
      </div>
    </div>

  </main>

  <script src="{{ url_for('static', filename='app.js') }}?v=4"></script>
</body>
</html>
